name: Update Energetica Natura Feed

on:
  schedule:
    - cron: "0 6 * * *"   # Dagelijks 06:00 UTC = 08:00 NL (zomer)
  workflow_dispatch:        # Handmatig triggeren via GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add energetica_natura_feed.xml
          git diff --staged --quiet || git commit -m "Update feed — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
